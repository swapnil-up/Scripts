# 1. Disable general transparency so you don't see through stacks
inactive-opacity = 1.0;
active-opacity = 1.0;

# 2. Enable actual dimming (the "Spotlight" effect)
inactive-dim = 0.3;          # 0.0 (no dim) to 1.0 (pure black). Try 0.3 first.
inactive-dim-fixed = true;   # This is KEY. It makes the dimming constant 
                             # regardless of window opacity.

# 3. Performance & Tiling Fixes
backend = "glx";             # Use GPU rendering for smoother dimming
glx-no-rebind-pixmap = true;
glx-no-stencil = true;
use-damage = true;           # Only redraw parts of the screen that changed

# Treat all windows in the same group as focused/unfocused together
# This prevents weird flickering when switching tabs in a stack
mark-wmwin-focused = true;
mark-ovl-redir-focused = true;
detect-client-opacity = true;
